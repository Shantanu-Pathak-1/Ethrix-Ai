<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bug • Arcade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:    #060912;
            --cyan:  #00E5FF;
            --blue:  #3b82f6;
            --gold:  #facc15;
            --green: #00FF87;
            --red:   #ef4444;
        }

        html, body { height: 100dvh; overflow: hidden; touch-action: none; }

        body {
            background: var(--bg)
                radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,229,255,0.08) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 100% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
            color: white; font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        body::after {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
            background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
        }

        .back-btn {
            position:fixed; top:13px; left:13px; z-index:200;
            background:rgba(6,9,18,.85); backdrop-filter:blur(12px);
            border:1px solid rgba(0,229,255,.12); color:rgba(255,255,255,.6);
            padding:8px 14px; border-radius:28px;
            font-size:clamp(.65rem,1.7vw,.78rem); font-weight:700; letter-spacing:.06em;
            text-decoration:none; display:flex; align-items:center; gap:6px;
            font-family:'Orbitron',monospace; transition:all .25s;
        }
        .back-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateX(-2px); }

        /* header */
        .hdr { position:relative; z-index:10; text-align:center; margin-bottom:clamp(6px,1.1vh,10px); margin-top:clamp(42px,6.5vh,54px); flex-shrink:0; }
        .badge { display:inline-flex; align-items:center; gap:5px; background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.18); border-radius:20px; padding:3px 12px; font-size:clamp(.53rem,1.3vw,.62rem); letter-spacing:.14em; color:var(--cyan); margin-bottom:5px; font-family:'Orbitron',monospace; }
        h1 { font-family:'Orbitron',monospace; font-size:clamp(1.2rem,4vw,1.8rem); font-weight:900; background:linear-gradient(135deg,var(--blue),var(--cyan),#fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:.08em; }

        /* canvas wrap */
        .canvas-wrap {
            position:relative; z-index:10; border-radius:14px; overflow:hidden;
            border:1px solid rgba(0,229,255,.15);
            box-shadow:0 0 28px rgba(0,229,255,.1), 0 0 50px rgba(0,0,0,.6);
            flex-shrink:0;
        }
        canvas {
            background:#0d1117; display:block;
            /* height drives the size; aspect ratio maintains 2:3 */
            height: min(52dvh, 420px);
            width: auto; aspect-ratio: 2/3;
        }

        /* overlay */
        .overlay {
            position:absolute; inset:0;
            background:rgba(6,9,18,.92); backdrop-filter:blur(8px);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:clamp(8px,1.4vh,13px); padding:18px; border-radius:14px;
        }
        .overlay.hidden { display:none; }
        .ov-title { font-family:'Orbitron',monospace; font-size:clamp(.9rem,3vw,1.2rem); font-weight:900; color:#fff; letter-spacing:.06em; text-align:center; }
        .ov-score { font-family:'Orbitron',monospace; font-size:.78rem; color:var(--cyan); font-weight:700; letter-spacing:.06em; }
        .ov-best  { font-family:'Orbitron',monospace; font-size:.72rem; color:var(--gold); font-weight:700; letter-spacing:.06em; }

        .diff-row { display:flex; gap:5px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:4px; }
        .mode-btn { padding:clamp(5px,.9vh,8px) clamp(10px,2.5vw,16px); border-radius:20px; font-family:'Orbitron',monospace; font-size:clamp(.6rem,1.5vw,.68rem); font-weight:700; letter-spacing:.06em; border:none; background:transparent; cursor:pointer; transition:all .2s; }
        .mode-btn.easy   { color:var(--green); }
        .mode-btn.normal { color:var(--cyan); }
        .mode-btn.hard   { color:var(--red); }
        .mode-btn.active { background:rgba(255,255,255,.08); }

        .start-btn { background:linear-gradient(135deg,var(--blue),var(--cyan)); color:var(--bg); border:none; padding:clamp(8px,1.4vh,11px) clamp(20px,5vw,28px); border-radius:24px; font-family:'Orbitron',monospace; font-size:clamp(.7rem,1.8vw,.8rem); font-weight:900; letter-spacing:.08em; cursor:pointer; transition:all .25s; box-shadow:0 0 16px rgba(0,229,255,.3); }
        .start-btn:hover { transform:scale(1.05); box-shadow:0 0 24px rgba(0,229,255,.45); }

        /* score bar */
        .score-bar { position:relative; z-index:10; display:flex; gap:10px; margin-top:clamp(6px,1.1vh,10px); flex-shrink:0; }
        .spill { background:rgba(8,12,24,.88); border:1px solid rgba(0,229,255,.12); border-radius:10px; padding:clamp(6px,1vh,9px) clamp(12px,2.5vw,16px); font-family:'Orbitron',monospace; font-size:clamp(.62rem,1.5vw,.72rem); font-weight:700; letter-spacing:.06em; }
        .spill .sv { color:var(--cyan); font-size:clamp(.78rem,2vw,.9rem); }
        .spill .bv { color:var(--gold); font-size:clamp(.78rem,2vw,.9rem); }
    </style>
</head>
<body>

    <a href="/tools" class="back-btn"><i class="fas fa-arrow-left"></i><span>Tools Lab</span></a>

    <div class="hdr">
        <div class="badge"><i class="fas fa-bug"></i> ARCADE ZONE</div>
        <h1>FLAPPY BUG</h1>
    </div>

    <div class="canvas-wrap">
        <div id="overlay" class="overlay">
            <h2 class="ov-title" id="ov-title">Ready to Code?</h2>
            <div class="diff-row">
                <button onclick="setMode('easy')"   id="btn-easy"   class="mode-btn easy">Easy</button>
                <button onclick="setMode('normal')" id="btn-normal" class="mode-btn normal active">Normal</button>
                <button onclick="setMode('hard')"   id="btn-hard"   class="mode-btn hard">Hard</button>
            </div>
            <div class="ov-score hidden" id="ov-score">Score: <span id="final-score">0</span></div>
            <div class="ov-best">Best: <span id="hs-display">0</span></div>
            <button onclick="startGame()" class="start-btn"><i class="fas fa-play" style="margin-right:6px;"></i>START</button>
        </div>
        <canvas id="gameCanvas" width="320" height="480"></canvas>
    </div>

    <div class="score-bar">
        <div class="spill">Score <span class="sv" id="score">0</span></div>
        <div class="spill">Best <span class="bv" id="best-score">0</span></div>
    </div>

    <script>
        const canvas=document.getElementById("gameCanvas"), ctx=canvas.getContext("2d");
        const scoreEl=document.getElementById("score");
        let frames=0,score=0,gameActive=false,animId,highScore=0;

        fetch('/api/arcade/highscore/flappy_bug').then(r=>r.json()).then(d=>{
            highScore=d.score||0;
            document.getElementById("best-score").innerText=highScore;
            document.getElementById("hs-display").innerText=highScore;
        }).catch(()=>{});

        const modes={
            easy:  {gap:170,dx:1.5,gravity:.1, jump:-3.5},
            normal:{gap:130,dx:2.0,gravity:.12,jump:-4.0},
            hard:  {gap:100,dx:3.0,gravity:.16,jump:-4.5}
        };
        let mode=modes.normal;

        function setMode(m){
            document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('btn-'+m).classList.add('active');
            mode=modes[m];
        }

        const bug={x:50,y:150,width:30,height:30,speed:0,
            draw(){ctx.font="30px Arial";ctx.fillText("🐛",this.x,this.y+25);},
            update(){this.speed+=mode.gravity;this.y+=this.speed;if(this.y+this.height>=canvas.height||this.y<=0)gameOver();},
            flap(){this.speed=mode.jump;}
        };

        const pipes={pos:[],width:50,
            draw(){
                for(let p of this.pos){
                    let g=ctx.createLinearGradient(p.x,0,p.x+this.width,0);
                    g.addColorStop(0,"#ef4444");g.addColorStop(1,"#991b1b");
                    ctx.fillStyle=g;
                    ctx.fillRect(p.x,0,this.width,p.y);
                    ctx.fillRect(p.x,p.y+mode.gap,this.width,canvas.height-p.y-mode.gap);
                    ctx.fillStyle="white";ctx.font="12px Courier";
                    ctx.fillText("404",p.x+10,p.y-20);
                    ctx.fillText("ERR",p.x+10,p.y+mode.gap+30);
                }
            },
            update(){
                if(frames%100===0)this.pos.push({x:canvas.width,y:Math.floor(Math.random()*(canvas.height-mode.gap-100))+50,passed:false});
                for(let p of this.pos){
                    p.x-=mode.dx;
                    if(bug.x+bug.width>p.x&&bug.x<p.x+this.width&&(bug.y<p.y||bug.y+bug.height>p.y+mode.gap))gameOver();
                    if(!p.passed&&bug.x>p.x+this.width){score++;scoreEl.innerText=score;p.passed=true;}
                }
                if(this.pos.length>0&&this.pos[0].x+this.width<=0)this.pos.shift();
            },
            reset(){this.pos=[];}
        };

        function draw(){
            ctx.fillStyle="#0d1117";ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle="rgba(0,229,255,0.04)";ctx.lineWidth=1;
            for(let x=0;x<canvas.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
            for(let y=0;y<canvas.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
            pipes.draw();bug.draw();
        }
        function loop(){if(!gameActive)return;bug.update();pipes.update();draw();frames++;animId=requestAnimationFrame(loop);}

        function startGame(){
            bug.y=150;bug.speed=0;pipes.reset();score=0;scoreEl.innerText=0;frames=0;
            gameActive=true;document.getElementById("overlay").classList.add("hidden");
            cancelAnimationFrame(animId);loop();
        }
        function gameOver(){
            gameActive=false;
            const ov=document.getElementById("overlay"); ov.classList.remove("hidden");
            document.getElementById("ov-title").innerText="System Crashed! 💥";
            document.getElementById("ov-score").classList.remove("hidden");
            document.getElementById("final-score").innerText=score;
            if(score>highScore){
                highScore=score;
                document.getElementById("best-score").innerText=highScore;
                document.getElementById("hs-display").innerText=highScore;
                fetch('/api/arcade/highscore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'flappy_bug',score:highScore})}).catch(()=>{});
            }
        }

        window.addEventListener("keydown",e=>{if(e.code==="Space"&&gameActive){e.preventDefault();bug.flap();}});
        canvas.addEventListener("mousedown",()=>{if(gameActive)bug.flap();});
        canvas.addEventListener("touchstart",e=>{e.preventDefault();if(gameActive)bug.flap();},{passive:false});
    </script>
</body>
</html>
