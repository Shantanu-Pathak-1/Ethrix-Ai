<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Code-le • Arcade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:     #060912;
            --green:  #10b981;
            --yellow: #f59e0b;
            --cyan:   #00E5FF;
            --border: rgba(0,229,255,0.12);
        }

        html, body { height: 100dvh; overflow: hidden; }

        body {
            background: var(--bg)
                radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,229,255,0.07) 0%, transparent 55%),
                radial-gradient(ellipse 50% 30% at 0% 100%, rgba(16,185,129,0.05) 0%, transparent 50%);
            color: white; font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        body::after {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
            background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
        }

        .back-btn {
            position:fixed; top:13px; left:13px; z-index:200;
            background:rgba(6,9,18,.85); backdrop-filter:blur(12px);
            border:1px solid var(--border); color:rgba(255,255,255,.6);
            padding:8px 14px; border-radius:28px;
            font-size:clamp(.65rem,1.7vw,.78rem); font-weight:700; letter-spacing:.06em;
            text-decoration:none; display:flex; align-items:center; gap:6px;
            font-family:'Orbitron',monospace; transition:all .25s;
        }
        .back-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateX(-2px); }

        /* header */
        .hdr {
            position:relative; z-index:10; text-align:center; flex-shrink:0;
            padding: clamp(44px,6.5vh,56px) 16px clamp(4px,0.8vh,8px);
        }
        .badge { display:inline-flex; align-items:center; gap:5px; background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.18); border-radius:20px; padding:3px 12px; font-size:clamp(.54rem,1.3vw,.62rem); letter-spacing:.14em; color:var(--cyan); margin-bottom:4px; font-family:'Orbitron',monospace; }
        h1 { font-family:'Orbitron',monospace; font-size:clamp(1.3rem,4.5vw,2rem); font-weight:900; background:linear-gradient(135deg,var(--green),var(--cyan) 60%,#fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:.1em; }
        .sub { font-size:clamp(.6rem,1.5vw,.7rem); color:rgba(0,229,255,.45); letter-spacing:.1em; margin-top:2px; }

        /* toast */
        #message { position:fixed; top:clamp(66px,9vh,80px); left:50%; transform:translateX(-50%); background:rgba(255,255,255,.95); color:#060912; padding:7px 18px; border-radius:8px; font-weight:800; font-size:.82rem; letter-spacing:.05em; opacity:0; transition:opacity .3s; z-index:200; font-family:'Orbitron',monospace; white-space:nowrap; }

        /* board — flex:1 + min-height:0 lets it shrink */
        #board {
            position:relative; z-index:10;
            flex: 1; min-height: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: clamp(3px, 0.6vh, 7px);
            padding: 0 12px;
            overflow: hidden;
        }
        .row { display:flex; gap:clamp(3px,.6vh,7px); }

        .tile {
            /* square tiles: use viewport height so they shrink on short screens */
            width:  clamp(36px, min(9.5vw, 7.5vh), 56px);
            height: clamp(36px, min(9.5vw, 7.5vh), 56px);
            border: 2px solid rgba(255,255,255,.1); border-radius:8px;
            background:rgba(8,12,24,.8);
            display:flex; align-items:center; justify-content:center;
            font-size:clamp(1rem,min(3.5vw,3vh),1.7rem); font-weight:800;
            transition:all .3s; font-family:'Orbitron',monospace;
        }
        .tile.active  { border-color:var(--cyan); box-shadow:0 0 10px rgba(0,229,255,.25); }
        .tile.correct { background:rgba(16,185,129,.25); border-color:var(--green); color:#fff; animation:flip .5s ease; box-shadow:0 0 10px rgba(16,185,129,.3); }
        .tile.present { background:rgba(245,158,11,.2);  border-color:var(--yellow); color:#fff; animation:flip .5s ease; box-shadow:0 0 10px rgba(245,158,11,.3); }
        .tile.absent  { background:rgba(55,65,81,.5); border-color:rgba(255,255,255,.06); color:rgba(255,255,255,.4); animation:flip .5s ease; }
        @keyframes flip { 0%{transform:rotateX(0);}50%{transform:rotateX(90deg);}100%{transform:rotateX(0);} }
        @keyframes shake { 0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-4px);}40%,80%{transform:translateX(4px);} }
        .shake { animation:shake .4s; }

        /* keyboard */
        #keyboard {
            position:relative; z-index:10; flex-shrink:0;
            width:100%; max-width:500px; margin:0 auto;
            padding: 0 6px clamp(8px,1.8vh,14px);
            display:flex; flex-direction:column; gap:clamp(3px,.6vh,6px);
        }
        .krow { display:flex; justify-content:center; gap:clamp(2px,.5vw,5px); }
        .key {
            background:rgba(20,28,50,.85); border:1px solid rgba(255,255,255,.1); border-radius:7px;
            font-weight:800; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all .2s;
            padding: clamp(8px,1.6vh,13px) clamp(4px,1vw,9px);
            font-size:clamp(.62rem,1.9vw,.86rem);
            font-family:'JetBrains Mono',monospace; flex:1;
            color:rgba(255,255,255,.8); letter-spacing:.04em; min-width:0;
        }
        .key:hover { background:rgba(0,229,255,.1); border-color:rgba(0,229,255,.3); color:#fff; }
        .key:active { transform:scale(.94); }
        .key.wide { flex:1.7; font-size:clamp(.54rem,1.5vw,.72rem); }
        .key[data-state="correct"] { background:rgba(16,185,129,.3); border-color:var(--green); color:#fff; }
        .key[data-state="present"] { background:rgba(245,158,11,.25); border-color:var(--yellow); color:#fff; }
        .key[data-state="absent"]  { background:rgba(30,30,40,.7); border-color:rgba(255,255,255,.04); color:rgba(255,255,255,.3); }
    </style>
</head>
<body>

    <a href="/tools" class="back-btn"><i class="fas fa-arrow-left"></i><span>Tools Lab</span></a>

    <div class="hdr">
        <div class="badge"><i class="fas fa-terminal"></i> ARCADE ZONE</div>
        <h1><i class="fas fa-terminal" style="-webkit-text-fill-color:#00E5FF;margin-right:6px;font-size:.85em;"></i>CODE-LE</h1>
        <p class="sub">Guess the 5-letter Tech Word • 6 attempts</p>
    </div>

    <div id="message"></div>
    <div id="board"></div>

    <div id="keyboard">
        <div class="krow">
            <div class="key" onclick="handleKey('Q')">Q</div><div class="key" onclick="handleKey('W')">W</div>
            <div class="key" onclick="handleKey('E')">E</div><div class="key" onclick="handleKey('R')">R</div>
            <div class="key" onclick="handleKey('T')">T</div><div class="key" onclick="handleKey('Y')">Y</div>
            <div class="key" onclick="handleKey('U')">U</div><div class="key" onclick="handleKey('I')">I</div>
            <div class="key" onclick="handleKey('O')">O</div><div class="key" onclick="handleKey('P')">P</div>
        </div>
        <div class="krow" style="padding:0 clamp(8px,3vw,22px);">
            <div class="key" onclick="handleKey('A')">A</div><div class="key" onclick="handleKey('S')">S</div>
            <div class="key" onclick="handleKey('D')">D</div><div class="key" onclick="handleKey('F')">F</div>
            <div class="key" onclick="handleKey('G')">G</div><div class="key" onclick="handleKey('H')">H</div>
            <div class="key" onclick="handleKey('J')">J</div><div class="key" onclick="handleKey('K')">K</div>
            <div class="key" onclick="handleKey('L')">L</div>
        </div>
        <div class="krow">
            <div class="key wide" onclick="handleKey('ENTER')" style="color:rgba(0,229,255,.9);">ENTER</div>
            <div class="key" onclick="handleKey('Z')">Z</div><div class="key" onclick="handleKey('X')">X</div>
            <div class="key" onclick="handleKey('C')">C</div><div class="key" onclick="handleKey('V')">V</div>
            <div class="key" onclick="handleKey('B')">B</div><div class="key" onclick="handleKey('N')">N</div>
            <div class="key" onclick="handleKey('M')">M</div>
            <div class="key wide" onclick="handleKey('BACKSPACE')" style="color:rgba(255,100,100,.9);"><i class="fas fa-backspace"></i></div>
        </div>
    </div>

    <script>
        const WORDS=["REACT","LINUX","ARRAY","FLOAT","MACRO","PIXEL","VIRUS","TOKEN","LOGIC","CACHE","QUERY","STACK","QUEUE","BYTES","CLOUD","DEBUG","PROXY","SWIFT","MOUSE","BOARD"];
        const target=WORDS[Math.floor(Math.random()*WORDS.length)];
        let curRow=0,curTile=0,over=false;

        // build board
        const boardEl=document.getElementById('board');
        for(let r=0;r<6;r++){
            const row=document.createElement('div'); row.className='row'; row.id=`row-${r}`;
            for(let c=0;c<5;c++){const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;row.appendChild(t);}
            boardEl.appendChild(row);
        }

        document.addEventListener('keydown',e=>{
            if(over)return; const k=e.key.toUpperCase();
            if(k==='ENTER'||k==='BACKSPACE'||/^[A-Z]$/.test(k))handleKey(k);
        });

        function handleKey(k){
            if(over)return;
            if(k==='BACKSPACE'){
                if(curTile>0){curTile--;const t=document.getElementById(`t-${curRow}-${curTile}`);t.innerText='';t.classList.remove('active');}
            }else if(k==='ENTER'){
                if(curTile===5)checkRow();
                else{showMsg("Not enough letters!");const r=document.getElementById(`row-${curRow}`);r.classList.add('shake');setTimeout(()=>r.classList.remove('shake'),400);}
            }else if(curTile<5){
                const t=document.getElementById(`t-${curRow}-${curTile}`);t.innerText=k;t.classList.add('active');curTile++;
            }
        }

        function checkRow(){
            let guess=''; const tiles=[];
            for(let i=0;i<5;i++){const t=document.getElementById(`t-${curRow}-${i}`);guess+=t.innerText;tiles.push(t);t.classList.remove('active');}
            let tc=target.split(''), gc=guess.split('');
            tiles.forEach((t,i)=>{setTimeout(()=>{if(gc[i]===tc[i]){t.classList.add('correct');updateKey(gc[i],'correct');tc[i]=null;}},i*200);});
            tiles.forEach((t,i)=>{setTimeout(()=>{if(!t.classList.contains('correct')){const ix=tc.indexOf(gc[i]);if(ix!==-1){t.classList.add('present');updateKey(gc[i],'present');tc[ix]=null;}else{t.classList.add('absent');updateKey(gc[i],'absent');}}},i*200);});
            setTimeout(()=>{
                if(guess===target){showMsg("SYSTEM HACKED! 🎉");confetti({particleCount:150,spread:70,origin:{y:.6}});over=true;}
                else{curRow++;curTile=0;if(curRow>5){showMsg(`ACCESS DENIED. Word: ${target}`);over=true;}}
            },1200);
        }
        function updateKey(l,type){
            document.querySelectorAll('.key').forEach(k=>{
                if(k.innerText.trim()===l){
                    const cur=k.getAttribute('data-state');
                    if(type==='correct')k.setAttribute('data-state','correct');
                    else if(type==='present'&&cur!=='correct')k.setAttribute('data-state','present');
                    else if(type==='absent'&&cur!=='correct'&&cur!=='present')k.setAttribute('data-state','absent');
                }
            });
        }
        function showMsg(m){const e=document.getElementById('message');e.innerText=m;e.style.opacity='1';setTimeout(()=>e.style.opacity='0',2500);}
    </script>
</body>
</html>
