<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found · Ethrix AI</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0B0F19; color: #fff; font-family: 'Inter', sans-serif; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes pulse-glow { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
        .float { animation: float 3s ease-in-out infinite; }
        .glow { animation: pulse-glow 2.5s ease-in-out infinite; text-shadow: 0 0 40px rgba(0,229,255,0.6); }
        .glass { background: rgba(18,24,38,0.7); border: 1px solid rgba(0,229,255,0.15); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Background dots -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-cyan-500/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-blue-500/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative text-center max-w-md">

        <!-- Logo -->
        <img src="/static/images/logo.png" class="w-16 h-16 rounded-full border-2 border-[#00E5FF]/30 mx-auto mb-8 float" onerror="this.style.display='none'">

        <!-- 404 number -->
        <div class="text-8xl md:text-9xl font-bold glow text-[#00E5FF] mb-4 leading-none">404</div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-white mb-3">Page Not Found</h1>
        <p class="text-gray-400 text-sm mb-8 leading-relaxed">
            This page doesn't exist or has been removed.<br>
            Don't worry — let's get you back on track! 😊
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-6 py-3 bg-gradient-to-r from-[#1E90FF] to-[#00E5FF] text-black font-bold rounded-xl text-sm hover:opacity-90 transition">
                Home par Jaao
            </a>
            <a href="javascript:history.back()" class="px-6 py-3 glass text-gray-300 font-semibold rounded-xl text-sm hover:text-white transition">
                Wapas Jaao
            </a>
        </div>

        <!-- Quick links -->
        <div class="mt-10 glass rounded-2xl p-4">
            <p class="text-xs text-gray-500 mb-3 uppercase tracking-wider">Yahan jaana tha shayad?</p>
            <div class="flex flex-wrap gap-2 justify-center">
                <a href="/"        class="text-xs text-[#00E5FF] hover:underline px-3 py-1 bg-[#00E5FF]/10 rounded-full">Chat</a>
                <a href="/tools"   class="text-xs text-[#00E5FF] hover:underline px-3 py-1 bg-[#00E5FF]/10 rounded-full">Tools Lab</a>
                <a href="/pricing" class="text-xs text-[#00E5FF] hover:underline px-3 py-1 bg-[#00E5FF]/10 rounded-full">Pricing</a>
                <a href="/about"   class="text-xs text-[#00E5FF] hover:underline px-3 py-1 bg-[#00E5FF]/10 rounded-full">About</a>
                <a href="/legal"   class="text-xs text-[#00E5FF] hover:underline px-3 py-1 bg-[#00E5FF]/10 rounded-full">Legal</a>
            </div>
        </div>

    </div>

    <p class="absolute bottom-6 text-gray-600 text-xs">© 2025 Ethrix AI</p>

</body>
</html>
