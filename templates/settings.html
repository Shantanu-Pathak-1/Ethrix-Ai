<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Center | Ethrix AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600&family=Roboto:wght@400;600&family=Courier+Prime&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        });
    </script>
    <style>
        body { 
            background-color: #050810; 
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.05), transparent 50%);
            color: #e0e0e0; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
        }

        /* Top Navbar */
        .settings-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
        }

        .settings-nav .brand { font-size: 1.3rem; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; }
        .settings-nav .brand img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(0,229,255,0.4); }
        .back-btn { color: #9ca3af; text-decoration: none; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: #fff; transform: translateX(-5px); }

        /* Main Container */
        .main-container { max-width: 1000px; margin: 0 auto; padding: 40px 5%; }

        .page-header { margin-bottom: 40px; text-align: center; }
        .page-header h1 { margin: 0; font-size: 2.5rem; font-weight: 700; color: white; }
        .page-header p { color: #6b7280; font-size: 1.1rem; margin-top: 8px; }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-bottom: 40px; }

        /* Glass Cards */
        .settings-card { 
            background: rgba(18, 24, 38, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .settings-card:hover { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .card-header i { font-size: 1.4rem; color: #fff; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .card-header h3 { margin: 0; font-size: 1.2rem; color: white; font-weight: 600; }

        .form-label { font-size: 0.95rem; font-weight: 600; color: #9ca3af; margin-bottom: 12px; display: block; }
        
        /* Interactive Radio Cards for Theme & Font */
        .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .radio-input { display: none; }
        .radio-card { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; border-radius: 12px; cursor: pointer; text-align: center;
            color: #9ca3af; transition: 0.3s; font-size: 0.95rem; font-weight: 500;
        }
        .radio-card:hover { background: rgba(255,255,255,0.05); color: white; }
        .radio-input:checked + .radio-card { 
            border-color: var(--dynamic-color, #00E5FF); 
            background: rgba(255,255,255,0.1); color: white;
            box-shadow: 0 0 15px var(--dynamic-glow, rgba(0,229,255,0.2)); 
        }

        /* Color Palette Picker */
        .color-palette { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .color-circle { 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            border: 2px solid transparent; transition: 0.3s;
        }
        .color-circle:hover { transform: scale(1.15); }
        .color-circle.selected { border: 2px solid white; transform: scale(1.2); box-shadow: 0 0 15px currentColor; }

        /* Custom Toggle Switch (COMPACT DESIGN FOR 5 TOGGLES) */
        .flex-between { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;}
        .flex-between .form-label { margin: 0; color: #e0e0e0; font-size: 0.9rem; }
        .flex-between .form-desc { font-size: 0.75rem; color: #6b7280; font-weight: normal; margin-top: 2px; display: block; }
        
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--dynamic-color, #00E5FF); box-shadow: 0 0 10px var(--dynamic-glow, rgba(0,229,255,0.5)); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Buttons Fixes */
        .btn-primary { 
            background: white; color: black; padding: 16px 30px; border: none; 
            border-radius: 14px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 1.1rem;
            display: inline-flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(255,255,255,0.4); transform: translateY(-2px); }

        .btn-danger, .btn-logout { 
            padding: 16px; border-radius: 12px; width: 100%; box-sizing: border-box; 
            font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; transition: 0.3s;
        }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239,68,68,0.4); color: #f87171; cursor: pointer; }
        .btn-danger:hover { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239,68,68,0.4); transform: translateY(-2px); }
        
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; margin-top: 10px; }
        .btn-logout:hover { background: rgba(255,255,255,0.05); color: white; transform: translateY(-2px); }

        /* Profile Button Link */
        .btn-profile { background: rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; font-weight: 600; margin-top: 15px; }
        .btn-profile:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .action-bar { display: flex; justify-content: center; padding-top: 20px; }

        @media (max-width: 768px) { .btn-primary { width: 100%; } .radio-grid { grid-template-columns: 1fr; } }
        /* ☀️ LIGHT MODE OVERRIDES ☀️ */
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
        body.light-mode .settings-nav { background: rgba(255, 255, 255, 0.9); border-bottom: 1px solid #e2e8f0; }
        body.light-mode .settings-nav .brand, body.light-mode .settings-nav .back-btn { color: #0f172a; }
        body.light-mode .page-header h1 { background: linear-gradient(135deg, #0f172a, var(--dynamic-color, #00E5FF)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.light-mode .page-header p { color: #64748b; }
        body.light-mode .settings-card { background: rgba(255, 255, 255, 0.8); border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body.light-mode .settings-card:hover { border-color: var(--dynamic-color, #00E5FF); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        body.light-mode .card-header h3, body.light-mode .form-label { color: #1e293b; }
        body.light-mode .card-header i { background: #f1f5f9; color: var(--dynamic-color, #00E5FF); }
        body.light-mode select { background: #ffffff; border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .radio-card { background: #f8fafc; border-color: #e2e8f0; color: #475569; }
        body.light-mode .radio-card:hover { background: #f1f5f9; color: #0f172a; }
        body.light-mode .radio-input:checked + .radio-card { background: #ffffff; color: #0f172a; border-color: var(--dynamic-color, #00E5FF); box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        body.light-mode .flex-between { background: #ffffff; border-color: #e2e8f0; }
        body.light-mode .flex-between .form-label { color: #0f172a; }
        body.light-mode .flex-between .form-desc { color: #64748b; }
        body.light-mode .slider { background-color: #cbd5e1; }
        body.light-mode .btn-logout { border-color: #cbd5e1; color: #475569; }
        body.light-mode .btn-logout:hover { background: #f1f5f9; color: #0f172a; }
        body.light-mode .btn-profile { background: #ffffff; border: 1px solid #cbd5e1; color: #1e293b; }
        body.light-mode .btn-profile:hover { background: #f1f5f9; }
        body.light-mode .color-circle { border-color: #cbd5e1; }
        body.light-mode .color-circle.selected { border-color: #0f172a; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<nav class="settings-nav">
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="brand"><img src="/static/images/logo.png"> Ethrix AI</div>
</nav>

<div class="main-container">
    <div class="page-header">
        <h1>Control Center</h1>
        <p>Customize your workspace, colors, and account settings.</p>
    </div>

    <div class="settings-grid">
        
        <div class="settings-card">
            <div class="card-header">
                <i class="fas fa-palette" style="color: #ec4899; background: rgba(236, 72, 153, 0.1);"></i>
                <h3>Look & Feel</h3>
            </div>
            
           <label class="form-label">Ethrix AI Color Theme</label>
            <div class="color-palette">
                <div class="color-circle {% if prefs.primary_color == '#00E5FF' %}selected{% endif %}" style="background: #00E5FF; color: #00E5FF;" onclick="selectColor('#00E5FF', this)" title="Neon Cyan"></div>
                <div class="color-circle {% if prefs.primary_color == '#3B82F6' %}selected{% endif %}" style="background: #3B82F6; color: #3B82F6;" onclick="selectColor('#3B82F6', this)" title="Electric Blue"></div>
                <div class="color-circle {% if prefs.primary_color == '#A855F7' %}selected{% endif %}" style="background: #A855F7; color: #A855F7;" onclick="selectColor('#A855F7', this)" title="Cyber Purple"></div>
                <div class="color-circle {% if prefs.primary_color == '#EC4899' %}selected{% endif %}" style="background: #EC4899; color: #EC4899;" onclick="selectColor('#EC4899', this)" title="Hot Pink"></div>
                <div class="color-circle {% if prefs.primary_color == '#EF4444' %}selected{% endif %}" style="background: #EF4444; color: #EF4444;" onclick="selectColor('#EF4444', this)" title="Crimson Red"></div>
                <div class="color-circle {% if prefs.primary_color == '#F59E0B' %}selected{% endif %}" style="background: #F59E0B; color: #F59E0B;" onclick="selectColor('#F59E0B', this)" title="Golden Amber"></div>
                <div class="color-circle {% if prefs.primary_color == '#22C55E' %}selected{% endif %}" style="background: #22C55E; color: #22C55E;" onclick="selectColor('#22C55E', this)" title="Matrix Green"></div>
                <div class="color-circle {% if prefs.primary_color == '#14B8A6' %}selected{% endif %}" style="background: #14B8A6; color: #14B8A6;" onclick="selectColor('#14B8A6', this)" title="Mint Teal"></div>
            </div>
            <p style="font-size: 0.8rem; color: #6b7280; margin-bottom: 25px;">Changes Vanta background, your chat bubbles, buttons, and hover effects.</p>
            
            <label class="form-label">Theme Mode</label>
            <div class="radio-grid">
                <label>
                    <input type="radio" name="theme" value="dark" class="radio-input" onchange="previewTheme()" {% if prefs.theme == 'dark' %}checked{% endif %}>
                    <div class="radio-card"><i class="fas fa-moon"></i> Dark</div>
                </label>
                <label>
                    <input type="radio" name="theme" value="light" class="radio-input" onchange="previewTheme()" {% if prefs.theme == 'light' %}checked{% endif %}>
                    <div class="radio-card"><i class="fas fa-sun"></i> Light</div>
                </label>
            </div>

            <label class="form-label">Typography</label>
            <div class="radio-grid">
                <label><input type="radio" name="font" value="Inter" class="radio-input" onchange="previewFont()" {% if prefs.font == 'Inter' %}checked{% endif %}><div class="radio-card" style="font-family: 'Inter';">Inter</div></label>
                <label><input type="radio" name="font" value="Poppins" class="radio-input" onchange="previewFont()" {% if prefs.font == 'Poppins' %}checked{% endif %}><div class="radio-card" style="font-family: 'Poppins';">Poppins</div></label>
                <label><input type="radio" name="font" value="Roboto" class="radio-input" onchange="previewFont()" {% if prefs.font == 'Roboto' %}checked{% endif %}><div class="radio-card" style="font-family: 'Roboto';">Roboto</div></label>
                <label><input type="radio" name="font" value="Courier Prime" class="radio-input" onchange="previewFont()" {% if prefs.font == 'Courier Prime' %}checked{% endif %}><div class="radio-card" style="font-family: 'Courier Prime';">Courier</div></label>
            </div>
        </div>

        <div class="settings-card">
            <div style="flex-grow: 1;">
                <div class="card-header">
                    <i class="fas fa-bolt" style="color: #eab308; background: rgba(234, 179, 8, 0.1);"></i>
                    <h3>Features & Profile</h3>
                </div>
                
                <div class="flex-between">
                    <label class="form-label">🔊 Voice Reply<span class="form-desc">AI reads responses aloud</span></label>
                    <label class="switch"><input type="checkbox" id="voice-toggle" {% if prefs.voice %}checked{% endif %}><span class="slider"></span></label>
                </div>

                <div class="flex-between">
                    <label class="form-label">⌨️ Send on 'Enter'<span class="form-desc">Press Enter to send (Shift+Enter for newline)</span></label>
                    <label class="switch"><input type="checkbox" id="enter-toggle" {% if prefs.send_on_enter %}checked{% endif %}><span class="slider"></span></label>
                </div>

                <div class="flex-between">
                    <label class="form-label">🎵 UI Sound Effects<span class="form-desc">Play soft SFX on actions</span></label>
                    <label class="switch"><input type="checkbox" id="sfx-toggle" {% if prefs.ui_sfx %}checked{% endif %}><span class="slider"></span></label>
                </div>

                <div class="flex-between">
                    <label class="form-label">⚡ Fast Mode<span class="form-desc">Skip AI typing animations</span></label>
                    <label class="switch"><input type="checkbox" id="fast-toggle" {% if prefs.fast_mode %}checked{% endif %}><span class="slider"></span></label>
                </div>

                <div class="flex-between" style="margin-bottom: 0;">
                    <label class="form-label">📜 Auto-Scroll<span class="form-desc">Always scroll to latest message</span></label>
                    <label class="switch"><input type="checkbox" id="scroll-toggle" {% if prefs.auto_scroll %}checked{% endif %}><span class="slider"></span></label>
                </div>
            </div>
            
            <a href="/profile-settings" class="btn-profile">
                <i class="fas fa-user-edit"></i> Edit Avatar & Name
            </a>
        </div>

        <div class="settings-card" style="border-color: rgba(239,68,68,0.2);">
            <div class="card-header" style="border-bottom-color: rgba(239,68,68,0.1);">
                <i class="fas fa-shield-alt" style="color: #f87171; background: rgba(239,68,68,0.1);"></i>
                <h3 style="color: #f87171;">Account & Security</h3>
            </div>
            
            <div style="display: flex; flex-direction: column; justify-content: flex-end; flex-grow: 1;">
                <button class="btn-danger" onclick="deleteAllChats()">
                    <i class="fas fa-trash-alt"></i> Clear Chat History
                </button>
                <a href="/logout" class="btn-logout">
                    <i class="fas fa-power-off"></i> Logout Safely
                </a>
            </div>
        </div>

    </div>

    <div class="action-bar">
        <button class="btn-primary" onclick="saveSettings()">
            <i class="fas fa-check-circle"></i> Save All Changes
        </button>
    </div>

</div>

<script>
    let chosenColor = "{{ prefs.primary_color }}";
    
    document.documentElement.style.setProperty('--dynamic-color', chosenColor);
    
    function selectColor(hex, element) {
        document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        chosenColor = hex;
        document.documentElement.style.setProperty('--dynamic-color', chosenColor);
    }
// ✨ Live Theme Preview
    function previewTheme() {
        const selectedTheme = document.querySelector('input[name="theme"]:checked').value;
        if (selectedTheme === 'light') {
            document.body.classList.add('light-mode');
        } else {
            document.body.classList.remove('light-mode');
        }
    }
    function previewFont() {
        const selectedFont = document.querySelector('input[name="font"]:checked').value;
        document.body.style.fontFamily = selectedFont + ", sans-serif";
    }

    async function saveSettings() {
        // ✨ FETCH PAYLOAD MAGIC YAHAN HAI ✨
        const theme = document.querySelector('input[name="theme"]:checked').value;
        const font = document.querySelector('input[name="font"]:checked').value;
        
        const voice = document.getElementById('voice-toggle').checked;
        const send_on_enter = document.getElementById('enter-toggle').checked;
        const ui_sfx = document.getElementById('sfx-toggle').checked;
        const fast_mode = document.getElementById('fast-toggle').checked;
        const auto_scroll = document.getElementById('scroll-toggle').checked;

        const btn = document.querySelector('.btn-primary');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Saving...";
        btn.disabled = true;

        const response = await fetch('/api/save_preferences', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                theme: theme, 
                font: font, 
                voice: voice, 
                primary_color: chosenColor,
                send_on_enter: send_on_enter,
                ui_sfx: ui_sfx,
                fast_mode: fast_mode,
                auto_scroll: auto_scroll
            })
        });
        const result = await response.json();
        
        btn.innerHTML = originalHTML;
        btn.disabled = false;

        if(result.status === "success") {
            // LocalStorage for global access
            localStorage.setItem('theme', theme);
            localStorage.setItem('primary_color', chosenColor);
            
            Swal.fire({
                icon: 'success', title: 'Settings Applied! ✨', text: 'Tumhara personalized workspace save ho gaya hai.',
                background: '#121826', color: '#fff', showConfirmButton: false, timer: 1500,
                customClass: { popup: 'border border-cyan-500/30 shadow-2xl rounded-2xl' }
            });
        }
    }

    async function deleteAllChats() {
        Swal.fire({
            title: 'Wipe History?', text: "Puraani saari chats delete ho jayengi!", icon: 'warning',
            showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#374151',
            confirmButtonText: 'Yes, wipe it!', background: '#0B0F19', color: '#fff',
            customClass: { popup: 'border border-red-500/30 shadow-2xl rounded-2xl' }
        }).then(async (result) => {
            if (result.isConfirmed) {
                await fetch('/api/delete_all_chats', { method: 'DELETE' });
                Swal.fire({ icon: 'success', title: 'Deleted!', text: 'Clean slate ready.', background: '#0B0F19', color: '#fff', timer: 1500, showConfirmButton: false });
            }
        });
    }
</script>
</body>
</html>
