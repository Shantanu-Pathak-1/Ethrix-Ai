<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Center | Ethrix AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600&family=Roboto:wght@400;600&family=Courier+Prime&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #050810; /* Deeper background for full page */
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.1), transparent 50%);
            color: #e0e0e0; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        /* Top Navbar just for Settings */
        .settings-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(11, 15, 25, 0.8);
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
        }

        .settings-nav .brand { font-size: 1.5rem; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; }
        .settings-nav .brand img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid rgba(0,229,255,0.4); }
        .back-btn { color: #9ca3af; text-decoration: none; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: #00E5FF; transform: translateX(-5px); }

        /* Main Content Area */
        .main-container { max-width: 1100px; margin: 0 auto; padding: 40px 5%; }

        .page-header { margin-bottom: 40px; }
        .page-header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 700; 
            background: linear-gradient(135deg, #fff, #00E5FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-header p { color: #6b7280; font-size: 1.1rem; margin-top: 8px; }

        /* Grid Layout for Cards */
        .settings-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; margin-bottom: 40px;
        }

        /* Glassmorphism Cards */
        .settings-card { 
            background: rgba(18, 24, 38, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; border-radius: 20px; 
            backdrop-filter: blur(10px); transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .settings-card:hover { border-color: rgba(0, 229, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.4); transform: translateY(-5px); }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .card-header i { font-size: 1.5rem; color: #00E5FF; background: rgba(0,229,255,0.1); padding: 12px; border-radius: 12px; }
        .card-header h3 { margin: 0; font-size: 1.2rem; color: white; font-weight: 600; }

        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 0.9rem; font-weight: 600; color: #9ca3af; margin-bottom: 10px; display: block; }
        
        select { 
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(0, 229, 255, 0.2); 
            background: rgba(0, 0, 0, 0.4); color: white; box-sizing: border-box; font-size: 1rem; transition: 0.3s;
            cursor: pointer; appearance: none;
        }
        select:focus { outline: none; border-color: #00E5FF; box-shadow: 0 0 15px rgba(0,229,255,0.15); }
        
        /* Custom Toggle Switch */
        .flex-between { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .flex-between .form-label { margin: 0; color: #e0e0e0; font-size: 1rem; }
        
        .switch { position: relative; display: inline-block; width: 54px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00E5FF; box-shadow: 0 0 15px rgba(0,229,255,0.5); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Buttons */
        .btn-primary { 
            background: linear-gradient(135deg, #1E90FF, #00E5FF); color: white; padding: 16px 30px; border: none; 
            border-radius: 14px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 1.1rem;
            display: inline-flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,229,255,0.3);
        }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(0,229,255,0.5); transform: translateY(-2px); }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239,68,68,0.4); color: #f87171; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-danger:hover { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239,68,68,0.4); transform: translateY(-2px); }

        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-logout:hover { background: rgba(255,255,255,0.05); color: white; }

        .action-bar { display: flex; justify-content: flex-end; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) { 
            .page-header h1 { font-size: 2rem; }
            .action-bar { justify-content: center; }
            .btn-primary { width: 100%; }
        }
    </style>
</head>
<body>

<nav class="settings-nav">
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <div class="brand">
        <img src="/static/images/logo.png" alt="Ethrix Logo">
        Ethrix AI
    </div>
</nav>

<div class="main-container">
    <div class="page-header">
        <h1>Control Center</h1>
        <p>Personalize your Ethrix AI experience and manage your account.</p>
    </div>

    <div class="settings-grid">
        
        <div class="settings-card">
            <div>
                <div class="card-header">
                    <i class="fas fa-paint-roller"></i>
                    <h3>Appearance</h3>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Theme Preference</label>
                    <select id="theme-select">
                        <option value="dark" {% if prefs.theme == 'dark' %}selected{% endif %}>🌌 Dark Mode (Default)</option>
                        <option value="light" {% if prefs.theme == 'light' %}selected{% endif %}>☀️ Light Mode</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Typography Style</label>
                    <select id="font-select" onchange="previewFont()">
                        <option value="Inter" style="font-family: 'Inter';" {% if prefs.font == 'Inter' %}selected{% endif %}>Inter (Modern & Clean)</option>
                        <option value="Poppins" style="font-family: 'Poppins';" {% if prefs.font == 'Poppins' %}selected{% endif %}>Poppins (Aesthetic & Round)</option>
                        <option value="Roboto" style="font-family: 'Roboto';" {% if prefs.font == 'Roboto' %}selected{% endif %}>Roboto (Classic Tech)</option>
                        <option value="Courier Prime" style="font-family: 'Courier Prime';" {% if prefs.font == 'Courier Prime' %}selected{% endif %}>Courier (Hacker Style)</option>
                        <option value="Comic Neue" style="font-family: 'Comic Neue';" {% if prefs.font == 'Comic Neue' %}selected{% endif %}>Comic (Fun & Cute)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="settings-card">
            <div>
                <div class="card-header">
                    <i class="fas fa-bolt"></i>
                    <h3>App Features</h3>
                </div>
                
                <div class="flex-between">
                    <label class="form-label">🔊 Voice Reply<br><span style="font-size: 0.8rem; color: #6b7280; font-weight: normal;">AI will speak responses aloud</span></label>
                    <label class="switch">
                        <input type="checkbox" id="voice-toggle" {% if prefs.voice %}checked{% endif %}>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="settings-card" style="border-color: rgba(239,68,68,0.2);">
            <div>
                <div class="card-header" style="border-bottom-color: rgba(239,68,68,0.1);">
                    <i class="fas fa-shield-alt" style="color: #f87171; background: rgba(239,68,68,0.1);"></i>
                    <h3 style="color: #f87171;">Account & Security</h3>
                </div>
                
                <button class="btn-danger" onclick="deleteAllChats()">
                    <i class="fas fa-trash-alt"></i> Clear Chat History
                </button>
                
                <a href="/logout" class="btn-logout">
                    <i class="fas fa-power-off"></i> Logout Safely
                </a>
            </div>
        </div>

    </div>

    <div class="action-bar">
        <button class="btn-primary" onclick="saveSettings()">
            <i class="fas fa-check-circle"></i> Save All Changes
        </button>
    </div>

</div>

<script>
    function previewFont() {
        const selectedFont = document.getElementById('font-select').value;
        document.body.style.fontFamily = selectedFont + ", sans-serif";
    }

    async function saveSettings() {
        const theme = document.getElementById('theme-select').value;
        const font = document.getElementById('font-select').value;
        const voice = document.getElementById('voice-toggle').checked;

        const btn = document.querySelector('.btn-primary');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Saving...";
        btn.disabled = true;

        const response = await fetch('/api/save_preferences', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ theme, font, voice })
        });
        const result = await response.json();
        
        btn.innerHTML = originalHTML;
        btn.disabled = false;

        if(result.status === "success") {
            localStorage.setItem('theme', theme);
            
            Swal.fire({
                icon: 'success', title: 'Settings Applied! ✨', text: 'Tumhara personalized workspace save ho gaya hai.',
                background: '#0B0F19', color: '#fff', showConfirmButton: false, timer: 1500,
                customClass: { popup: 'border border-cyan-500/30 shadow-2xl rounded-2xl' }
            });
        }
    }

    async function deleteAllChats() {
        Swal.fire({
            title: 'Wipe History?', text: "Puraani saari chats hamesha ke liye delete ho jayengi!", icon: 'warning',
            showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#374151',
            confirmButtonText: 'Yes, wipe it!', background: '#0B0F19', color: '#fff',
            customClass: { popup: 'border border-red-500/30 shadow-2xl rounded-2xl' }
        }).then(async (result) => {
            if (result.isConfirmed) {
                await fetch('/api/delete_all_chats', { method: 'DELETE' });
                Swal.fire({ icon: 'success', title: 'Deleted!', text: 'Clean slate ready.', background: '#0B0F19', color: '#fff', timer: 1500, showConfirmButton: false });
            }
        });
    }
</script>
</body>
</html>
