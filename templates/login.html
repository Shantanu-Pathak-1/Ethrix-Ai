<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MwrbfdlLx3xF8CILvK16Glar7CAECETS50_zOaXseyg" />
    <title>Login - Ethrix AI</title>
    
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    
    <style>
        /* 🌟 MOBILE FIRST & RESPONSIVE DESIGN 🌟 */
        body { margin: 0; background: #000000; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; overflow-x: hidden; overflow-y: auto; padding: 16px; box-sizing: border-box; }
        
        .login-card { width: 100%; max-width: 380px; padding: 30px; background: rgba(18, 24, 38, 0.85); backdrop-filter: blur(20px); border-radius: 24px; text-align: center; position: relative; z-index: 10; transition: transform 0.3s, padding 0.3s; box-shadow: 0 8px 32px 0 rgba(0, 229, 255, 0.15); border: 1px solid rgba(0, 229, 255, 0.3); color: #e0e0e0; box-sizing: border-box; }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px 0 rgba(0, 229, 255, 0.3); }
        
        .login-logo-responsive { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(0, 229, 255, 0.5); margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); transition: all 0.3s; }
        
        .brand-title { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #1E90FF, #00E5FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; transition: font-size 0.3s; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab { cursor: pointer; color: #888; font-weight: 600; padding: 5px 10px; transition: 0.3s; }
        .tab.active { color: #00E5FF; border-bottom: 2px solid #00E5FF; }
        
        input:not([type="checkbox"]) { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 10px; box-sizing: border-box; font-family: inherit; transition: all 0.3s; }
        input:not([type="checkbox"]):focus { border-color: #00E5FF; outline: none; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        input::placeholder { color: #888; }
        
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #1E90FF, #00E5FF); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
        .btn:hover:not(:disabled) { background: linear-gradient(135deg, #00C6DD, #00E5FF); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4); }
        .btn:disabled { background: rgba(0, 229, 255, 0.6); cursor: not-allowed; box-shadow: none; }
        
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 10px; border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 10px; background: rgba(255,255,255,0.05); color: #e0e0e0; font-weight: 600; cursor: pointer; margin-top: 5px; text-decoration: none; transition: 0.2s; }
        .google-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        
        /* 🔥 NEW CONSENT CHECKBOX STYLES 🔥 */
        .consent-wrapper { display: flex; align-items: flex-start; gap: 10px; margin: 15px 0 10px 0; text-align: left; }
        .consent-checkbox { margin-top: 3px; accent-color: #00E5FF; flex-shrink: 0; width: 16px; height: 16px; cursor: pointer; }
        .consent-text { font-size: 0.75rem; color: #9ca3af; line-height: 1.5; cursor: pointer; user-select: none; }
        .consent-text a { color: #00E5FF; text-decoration: underline; text-decoration-color: rgba(0, 229, 255, 0.3); transition: all 0.2s; }
        .consent-text a:hover { text-decoration-color: #00E5FF; color: #fff; }

        .magic-input-wrapper { position: relative; width: 100%; }
        .magic-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: transform 0.2s; }
        .magic-btn:hover { transform: translateY(-50%) scale(1.2); }
        .magic-btn:active { transform: translateY(-50%) scale(0.9); }

        .hidden { display: none; }
        .otp-sent { color: #4ade80; font-size: 0.8rem; margin-top: 5px; }
        
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid #ffffff; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 📱 RESPONSIVE ADJUSTMENTS FOR MOBILE & TABLET 📱 */
        @media (max-width: 480px) {
            .login-card { padding: 20px 16px; border-radius: 20px; width: 100%; }
            .brand-title { font-size: 1.7rem; margin-bottom: 15px; }
            .login-logo-responsive { width: 70px; height: 70px; margin-bottom: 10px; }
            input:not([type="checkbox"]), .btn, .google-btn { padding: 10px; font-size: 0.9rem; }
            .tabs { margin-bottom: 15px; }
            .tab { font-size: 0.9rem; padding: 4px 8px; }
            .consent-text { font-size: 0.7rem; }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .login-card { padding: 25px 20px; max-width: 350px; }
            .brand-title { font-size: 1.85rem; }
            .login-logo-responsive { width: 80px; height: 80px; }
        }

        /* 🚀 CUSTOM NEON CURSOR & CLICK ANIMATION (DESKTOP ONLY) */
        @media (pointer: fine) {
            body, a, button, input, label, .tab { cursor: none !important; }
            .cursor-dot {
                position: fixed; top: 0; left: 0; width: 8px; height: 8px;
                background: #00E5FF; border-radius: 50%; transform: translate(-50%, -50%);
                z-index: 99999; pointer-events: none; box-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF;
            }
            .cursor-outline {
                position: fixed; top: 0; left: 0; width: 32px; height: 32px;
                border: 2px solid rgba(0, 229, 255, 0.6); border-radius: 50%;
                transform: translate(-50%, -50%); z-index: 99998; pointer-events: none;
                transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease;
            }
            .click-ripple {
                position: fixed; top: 0; left: 0; width: 40px; height: 40px; border-radius: 50%;
                background: radial-gradient(circle, rgba(0, 229, 255, 0.8) 0%, rgba(0, 0, 0, 0) 70%);
                transform: translate(-50%, -50%) scale(0); z-index: 99997; pointer-events: none;
                animation: ripple-anim 0.5s ease-out forwards;
            }
            @keyframes ripple-anim {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
            }
        }
    </style>
</head>
<body id="vanta-bg">

<div class="login-card">
    <div class="flex flex-col items-center mb-4">
        <img src="/static/images/logo.png" class="login-logo-responsive">
        <div class="brand-title" style="margin-bottom: 5px;">Ethrix AI</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="login-form">
        <input type="text" id="login-id" placeholder="Email or Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn" onclick="handleLogin(this)">Let's Go!</button>
        
        <div style="margin: 15px 0 5px 0; font-size: 0.8rem; color: #888; position: relative; z-index: 1;">OR</div>
        
        <div class="consent-wrapper">
            <input type="checkbox" id="google-consent" class="consent-checkbox">
            <label for="google-consent" class="consent-text">
                I agree to the <a href="/legal" target="_blank">Terms</a> and <a href="/privacy" target="_blank">Privacy Policy</a>, and I authorize Ethrix AI to act as my agent for connected Google services.
            </label>
        </div>

        <button onclick="handleGoogleLogin()" class="google-btn">
            <svg style="width:20px;height:20px" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
        </button>
    </div>

    <div id="signup-form" class="hidden">
        <div id="step-1">
            <input type="email" id="reg-email" placeholder="Enter your Email">
            <button class="btn" onclick="sendOTP(this)">Send Verification Code</button>
        </div>
        
        <div id="step-2" class="hidden">
            <input type="text" id="reg-otp" placeholder="Enter 6-digit Code">
            <button class="btn" onclick="verifyOTP(this)">Verify & Continue</button>
            <p class="otp-sent">Code sent! Check your inbox & spam.</p>
        </div>
        
        <div id="step-3" class="hidden">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-user" placeholder="Choose a username">
            <label style="font-size: 0.8rem; color: #888; display: block; text-align: left; margin-bottom: -5px; margin-left: 5px;">Date of Birth</label>
            <input type="date" id="reg-dob">
            
            <div class="magic-input-wrapper">
                <input type="password" id="reg-pass" placeholder="Create Password">
                <button class="magic-btn" onclick="generateMagicPass()" title="Generate Magic Password">🪄</button>
            </div>

            <div class="consent-wrapper">
                <input type="checkbox" id="terms-agree" class="consent-checkbox">
                <label for="terms-agree" class="consent-text">
                    I agree to the <a href="/legal" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>. I am at least 13 years old.
                </label>
            </div>
            
            <button class="btn" onclick="completeSignup(this)">Create Account 🚀</button>
        </div>
    </div>
</div>

<script>
    // --- CUSTOM NEON CURSOR LOGIC ---
    document.addEventListener("DOMContentLoaded", () => {
        if (window.matchMedia("(pointer: fine)").matches) {
            const dot = document.createElement("div"); dot.className = "cursor-dot";
            const outline = document.createElement("div"); outline.className = "cursor-outline";
            document.body.appendChild(dot); document.body.appendChild(outline);

            window.addEventListener("mousemove", (e) => {
                dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`;
                outline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
            });

            window.addEventListener("mousedown", (e) => {
                const ripple = document.createElement("div"); ripple.className = "click-ripple";
                ripple.style.left = `${e.clientX}px`; ripple.style.top = `${e.clientY}px`;
                document.body.appendChild(ripple);
                outline.style.transform = "translate(-50%, -50%) scale(0.7)";
                setTimeout(() => outline.style.transform = "translate(-50%, -50%) scale(1)", 150);
                setTimeout(() => ripple.remove(), 500);
            });

            const addHoverEffect = () => {
                document.querySelectorAll("a, button, input, label, .tab").forEach(el => {
                    el.addEventListener("mouseenter", () => {
                        outline.style.width = "50px"; outline.style.height = "50px";
                        outline.style.backgroundColor = "rgba(0, 229, 255, 0.1)"; 
                    });
                    el.addEventListener("mouseleave", () => {
                        outline.style.width = "32px"; outline.style.height = "32px";
                        outline.style.backgroundColor = "transparent";
                    });
                });
            };
            addHoverEffect();
        }
    });

    // Vanta Fog Background
    VANTA.FOG({
        el: "#vanta-bg",
        highlightColor: 0x00e5ff, 
        midtoneColor: 0x1e90ff,   
        lowlightColor: 0x0b0f19,  
        baseColor: 0x000000,      
        blurFactor: 0.60, 
        speed: 1.20, 
        zoom: 0.80 
    });

    function setLoading(btn, isLoading, text) {
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div> Processing...`;
        } else {
            btn.disabled = false;
            btn.innerHTML = text;
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(tab === 'login') {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
        } else {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
        }
    }

    function generateMagicPass() {
        const email = document.getElementById('reg-email').value;
        const passField = document.getElementById('reg-pass');
        if (!email) { return Swal.fire('Oops!', 'Email is required to generate magic password!', 'warning'); }
        let namePart = email.split('@')[0].replace(/[^a-zA-Z0-9]/g, '');
        if(namePart.length < 3) namePart = "EthrixUser";
        const randomNum = Math.floor(1000 + Math.random() * 9000);
        const magicPass = namePart.charAt(0).toUpperCase() + namePart.slice(1) + '@' + randomNum;
        passField.value = magicPass; passField.type = "text";
        const btn = document.querySelector('.magic-btn'); btn.innerHTML = "✨"; setTimeout(() => btn.innerHTML = "🪄", 1000);
        Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#1e1e1e', color: '#fff', icon: 'success', title: 'Magic Password Generated!' });
    }

    async function sendOTP(btn) {
        const email = document.getElementById('reg-email').value;
        if(!email) return Swal.fire('Oops!', 'Please enter your email.', 'warning');
        setLoading(btn, true);
        try {
            const res = await fetch('/api/send_otp', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email}) });
            const data = await res.json();
            if(data.status === 'success') { document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden'); } 
            else { Swal.fire('Error', data.message, 'error'); }
        } catch(e) { Swal.fire('Error', 'Server error.', 'error'); }
        setLoading(btn, false, 'Send Verification Code');
    }

    async function verifyOTP(btn) {
        const email = document.getElementById('reg-email').value;
        const otp = document.getElementById('reg-otp').value;
        if(!otp) return Swal.fire('Oops!', 'Please enter the code.', 'warning');
        setLoading(btn, true);
        try {
            const res = await fetch('/api/verify_otp', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, otp}) });
            const data = await res.json();
            if(data.status === 'success') { document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-3').classList.remove('hidden'); } 
            else { Swal.fire('Error', 'Incorrect code.', 'error'); }
        } catch(e) { Swal.fire('Error', 'Server connection failed.', 'error'); }
        setLoading(btn, false, 'Verify & Continue');
    }

    async function completeSignup(btn) {
        const termsChecked = document.getElementById('terms-agree')?.checked;
        if (!termsChecked) return Swal.fire({
            title: 'Action Required',
            html: 'Please agree to our <a href="/legal" target="_blank" style="color:#00E5FF">Terms & Privacy Policy</a> to continue.',
            icon: 'warning', background: '#1e1e1e', color: '#fff', confirmButtonColor: '#00E5FF'
        });
        const payload = {
            email: document.getElementById('reg-email').value,
            full_name: document.getElementById('reg-name').value,
            username: document.getElementById('reg-user').value,
            dob: document.getElementById('reg-dob').value,
            password: document.getElementById('reg-pass').value
        };
        if(!payload.full_name || !payload.username || !payload.dob || !payload.password) return Swal.fire('Hold up!', 'Please fill in all fields.', 'warning');
        setLoading(btn, true);
        try {
            const res = await fetch('/api/complete_signup', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.status === 'success') { Swal.fire({ title: 'Welcome Aboard! 🚀', text: 'Your account has been created successfully.', icon: 'success', background: '#1e1e1e', color: '#fff', confirmButtonColor: '#00E5FF' }).then(() => window.location.href = '/'); } 
            else { Swal.fire('Error', data.message || 'Signup failed', 'error'); }
        } catch(e) { Swal.fire('Error', 'Connection failed.', 'error'); }
        setLoading(btn, false, 'Create Account 🚀');
    }

    async function handleLogin(btn) {
        const identifier = document.getElementById('login-id').value;
        const password = document.getElementById('login-pass').value;
        if(!identifier || !password) return Swal.fire('Oops!', 'Enter your credentials.', 'warning');
        setLoading(btn, true);
        try {
            const res = await fetch('/api/login_manual', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({identifier, password}) });
            const data = await res.json();
            if(data.status === 'success') window.location.href = '/';
            else Swal.fire('Error', data.message, 'error');
        } catch(e) { Swal.fire('Error', 'Login failed.', 'error'); }
        setLoading(btn, false, "Let's Go!");
    }

    // 🔥 NEW FUNCTION: HANDLE GOOGLE LOGIN CONSENT 🔥
    function handleGoogleLogin() {
        const consentChecked = document.getElementById('google-consent').checked;
        if (!consentChecked) {
            Swal.fire({
                title: 'Consent Required',
                text: 'Please check the box to agree to our Terms, Privacy Policy, and authorize Ethrix AI for Google services.',
                icon: 'warning',
                background: '#1e1e1e',
                color: '#fff',
                confirmButtonColor: '#00E5FF'
            });
            return;
        }
        // Redirect to auth endpoint only if checked
        window.location.href = '/auth/login';
    }
</script>
</body>
</html>
