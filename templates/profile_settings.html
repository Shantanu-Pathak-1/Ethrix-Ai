<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile Settings | Ethrix AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            background-color: #0B0F19; /* Ethrix Dark Theme */
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh;
        }
        
        /* Glassmorphism Container */
        .container { 
            width: 100%; max-width: 650px; 
            background: rgba(18, 24, 38, 0.85); 
            border: 1px solid rgba(0, 229, 255, 0.2); 
            backdrop-filter: blur(20px);
            padding: 35px; border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }

        h2 { margin-top: 0; color: #fff; font-size: 1.6rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 15px; }
        h2 i { color: #00E5FF; }
        
        .profile-preview-wrapper { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .profile-preview { 
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover; 
            margin-bottom: 20px; border: 3px solid #00E5FF; 
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            background-color: #121826;
        }
        
        .form-group { margin-bottom: 25px; }
        .form-label { font-size: 0.95rem; font-weight: 600; color: #9ca3af; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .form-label i { color: #00E5FF; }
        
        input[type="text"] { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid rgba(0, 229, 255, 0.3); 
            background: rgba(0, 0, 0, 0.4); color: white; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input[type="text"]:focus { outline: none; border-color: #00E5FF; box-shadow: 0 0 15px rgba(0,229,255,0.15); }
        
        /* Avatars Grid */
        .avatars-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); 
            gap: 15px; justify-items: center; margin-top: 12px;
        }
        
        .avatar-option { 
            width: 65px; height: 65px; border-radius: 50%; cursor: pointer; 
            border: 2px solid transparent; transition: all 0.3s ease; 
            background-color: #121826; object-fit: cover;
        }
        
        .avatar-option:hover { transform: scale(1.1); border-color: rgba(0,229,255,0.5); }
        .avatar-option.selected { 
            border-color: #00E5FF; transform: scale(1.15); 
            box-shadow: 0 0 15px rgba(0,229,255,0.6); 
        }
        
        /* Buttons */
        .btn { 
            background: linear-gradient(135deg, #1E90FF, #00E5FF); 
            color: white; padding: 14px 20px; border: none; 
            border-radius: 12px; cursor: pointer; transition: 0.3s; 
            font-weight: bold; width: 100%; box-sizing: border-box; font-size: 16px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.5); transform: translateY(-2px); }
        .btn-upload { width: auto; display: inline-flex; padding: 10px 20px; font-size: 14px; border-radius: 10px; }
        
        /* Premium Lock Overlay */
        .premium-locked-container { position: relative; display: flex; justify-content: center; cursor: pointer; width: 65px; height: 65px; transition: 0.3s; }
        .premium-locked-container:hover { transform: scale(1.05); }
        .premium-locked-img { filter: grayscale(80%) brightness(0.5); pointer-events: none; border: 2px solid transparent; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .premium-lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fbbf24; font-size: 1.3rem; text-shadow: 0 0 15px rgba(0,0,0,0.9); pointer-events: none; }

        /* Premium Label overrides */
        .premium-label { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .premium-label i { color: #fbbf24; }

        .back-link { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 25px; color: #9ca3af; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: #00E5FF; }

        /* Cropper Modal */
        #cropper-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .cropper-container-inner { background: #121826; padding: 25px; border-radius: 16px; border: 1px solid rgba(0,229,255,0.3); width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .img-container { width: 100%; max-height: 50vh; margin-bottom: 20px; display: flex; justify-content: center; }
        .btn-cancel { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239,68,68,0.5); color: #f87171; }
        .btn-cancel:hover { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239,68,68,0.4); }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 16px; }
            .profile-preview { width: 110px; height: 110px; }
            .avatar-option, .premium-locked-container { width: 55px; height: 55px; }
            .avatars-grid { grid-template-columns: repeat(auto-fit, minmax(55px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-user-cog"></i> Profile Studio</h2>
    
    <div class="profile-preview-wrapper">
        <img src="{{ current_pic }}" id="main-profile-pic" class="profile-preview" alt="Profile" onerror="this.src='/static/images/logo.png'">
        <br>
        <label class="btn btn-upload" for="upload-image">
            <i class="fas fa-camera"></i> Upload Custom Photo
        </label>
        <input type="file" id="upload-image" accept="image/*" style="display: none;">
    </div>

    <div class="form-group">
        <label class="form-label"><i class="fas fa-id-badge"></i> Display Name</label>
        <input type="text" id="user-name" value="{{ current_name }}" placeholder="Enter your name...">
    </div>

    <div class="form-group">
        <label class="form-label"><i class="fas fa-grin-stars"></i> Standard Avatars</label>
        <div class="avatars-grid">
            {% for avatar in default_avatars %}
            <img src="{{ avatar }}" class="avatar-option" onclick="selectAvatar('{{ avatar }}', this)" onerror="this.style.display='none'">
            {% endfor %}
        </div>
    </div>

    <div class="form-group" style="margin-top: 30px;">
        <label class="form-label premium-label"><i class="fas fa-crown"></i> Elite Exclusives</label>
        <div class="avatars-grid">
            {% for avatar in premium_avatars %}
                {% if is_pro %}
                    <img src="{{ avatar }}" class="avatar-option" style="border-color: rgba(251,191,36,0.4);" onclick="selectAvatar('{{ avatar }}', this)" onerror="this.style.display='none'">
                {% else %}
                    <div class="premium-locked-container" onclick="showPremiumAlert()">
                        <img src="{{ avatar }}" class="premium-locked-img" onerror="this.parentElement.style.display='none'">
                        <i class="fas fa-lock premium-lock-icon"></i>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>

    <button class="btn" style="margin-top: 30px;" onclick="saveProfile()">
        <i class="fas fa-save"></i> Save Profile
    </button>
    
    <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i> Return to Dashboard
    </a>
</div>

<div id="cropper-modal">
    <div class="cropper-container-inner">
        <h3 style="margin-top: 0; color: white; text-align: center; font-size: 1.2rem; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 15px; margin-bottom: 20px;">
            <i class="fas fa-crop-alt" style="color: #00E5FF; margin-right: 8px;"></i> Adjust Image
        </h3>
        <div class="img-container">
            <img id="image-to-crop" src="">
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn" onclick="applyCrop()"><i class="fas fa-check"></i> Apply</button>
            <button class="btn btn-cancel" onclick="document.getElementById('cropper-modal').style.display='none'"><i class="fas fa-times"></i> Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentSelectedPic = "{{ current_pic }}";
    let cropper;

    function selectAvatar(url, element) {
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        currentSelectedPic = url;
        document.getElementById('main-profile-pic').src = url;
    }

    function showPremiumAlert() {
        Swal.fire({
            icon: 'warning',
            title: 'Elite Avatar Locked',
            text: 'Unlock this exclusive 3D avatar by upgrading to the Ethrix Pro Plan!',
            background: '#121826',
            color: '#fff',
            iconColor: '#fbbf24',
            confirmButtonColor: '#00E5FF',
            confirmButtonText: '<i class="fas fa-rocket"></i> Upgrade to Pro',
            showCancelButton: true,
            cancelButtonColor: 'rgba(255,255,255,0.1)',
            cancelButtonText: 'Not Now',
            customClass: {
                popup: 'border border-cyan-500/30 shadow-2xl rounded-2xl'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/"; 
            }
        });
    }

    document.getElementById('upload-image').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('image-to-crop').src = event.target.result;
                document.getElementById('cropper-modal').style.display = 'flex';
                
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('image-to-crop'), {
                    aspectRatio: 1, 
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.9,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    toggleDragModeOnDblclick: false,
                });
            };
            reader.readAsDataURL(file);
        }
    });

    function applyCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
        currentSelectedPic = canvas.toDataURL('image/jpeg', 0.9); // using jpeg here to save space
        document.getElementById('main-profile-pic').src = currentSelectedPic;
        document.getElementById('cropper-modal').style.display = 'none';
        
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
    }

    async function saveProfile() {
        const newName = document.getElementById('user-name').value;
        const btn = document.querySelector('.btn[onclick="saveProfile()"]');
        const originalHTML = btn.innerHTML;
        
        btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Saving...";
        btn.disabled = true;

        const response = await fetch('/api/update_advanced_profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_name: newName, new_picture: currentSelectedPic })
        });
        const result = await response.json();
        
        btn.innerHTML = originalHTML;
        btn.disabled = false;

        if(result.status === "success") {
            Swal.fire({
                icon: 'success',
                title: 'Profile Updated',
                text: 'Your new avatar and name are synced.',
                background: '#121826',
                color: '#fff',
                iconColor: '#00E5FF',
                showConfirmButton: false,
                timer: 1500,
                customClass: { popup: 'border border-cyan-500/30 shadow-2xl rounded-2xl' }
            }).then(() => {
                window.location.reload();
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Sync Error',
                text: 'Unable to save profile changes.',
                background: '#121826', color: '#fff'
            });
        }
    }
</script>
</body>
</html>
